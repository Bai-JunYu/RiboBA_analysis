tool: ribotish
entry_script: tools_orf_prediction/run_ribo_tish.sh
output_root_default: ../../RiboBA_analysis_data/processed_data/tools_orf_prediction

inputs:
  sample_dir_glob: "{output_root}/ribotish/results/*/"
  genome_fasta: data/genome/Homo_sapiens.GRCh38.dna.primary_assembly.fa
  gtf: data/gtf/Homo_sapiens.GRCh38.109.gtf
  bam_pattern: "{sample}_sorted.bam"

quality:
  p: 15
  v: true
  l: [19, 42]
  th: 0.34

predict:
  alt: true
  framebest: true
  p: 15
  v: true
  output: pred.txt

outputs:
  tool_root: "{output_root}/ribotish"
  per_sample_prediction: "{output_root}/ribotish/results/{sample}/pred.txt"
